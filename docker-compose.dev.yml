services:
  api:
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/classivo
      REDIS_URL: redis://redis:6379
    command: sh -c "pnpm install && pnpm prisma generate && pnpm start:dev"
    volumes:
      - .:/app
      - api_node_modules:/app/node_modules
    ports:
      - '3000:3000'

volumes:
  api_node_modules:
